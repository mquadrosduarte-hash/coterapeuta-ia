<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Coterapeuta IA</title>

<style>

/* ---------- BASE ---------- */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#f5f5f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:640px;
padding:40px 20px;
text-align:center;
}

/* ---------- AGENT IMAGE ---------- */

.hero img{
width:120px;
margin-bottom:20px;
}

/* ---------- TITLES ---------- */

h1{
font-size:28px;
margin:0;
font-weight:600;
}

.subtitle{
color:#6e6e73;
margin-top:8px;
margin-bottom:30px;
font-size:15px;
}

/* ---------- CARD ---------- */

.card{
background:white;
border-radius:16px;
padding:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

/* ---------- LOGIN FORM ---------- */

.login-form{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.login-input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e5e5e7;
font-size:14px;
box-sizing:border-box;
outline:none;
}

.login-input:focus{
border-color:#0071e3;
}

.login-button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0071e3;
color:white;
font-size:14px;
cursor:pointer;
}

.login-button:hover{
background:#0077ed;
}

.error{
color:#ff3b30;
margin-top:10px;
font-size:14px;
}

/* ---------- CHAT ---------- */

.messages{
height:300px;
overflow-y:auto;
text-align:left;
margin-bottom:15px;
}

.message{
margin-bottom:12px;
line-height:1.5;
font-size:15px;
}

.user{
font-weight:600;
}

.bot{
color:#333;
}

/* ---------- INPUT AREA ---------- */

.input-area{
display:flex;
gap:10px;
}

textarea{
flex:1;
border-radius:10px;
border:1px solid #e5e5e7;
padding:12px;
font-family:inherit;
font-size:14px;
resize:none;
outline:none;
}

textarea:focus{
border-color:#0071e3;
}

button.send{
background:#0071e3;
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

button.send:hover{
background:#0077ed;
}

.hidden{
display:none;
}

</style>

</head>


<body>

<div class="container">

<!-- AGENT IMAGE -->

<div class="hero">
<img src="assets/agent.png">
</div>

<h1>Coterapeuta IA</h1>

<div class="subtitle">
Seu co-terapeuta de Terapia dos Esquemas
</div>


<!-- LOGIN -->

<div class="card" id="loginBox">

<h3 style="margin-bottom:12px;">Acesso ao assistente</h3>

<div class="login-form">

<input id="user" class="login-input" placeholder="Usuário">

<input id="password" class="login-input" type="password" placeholder="Senha">

<button class="login-button" onclick="login()">Entrar</button>

</div>

<p id="loginError" class="error"></p>

</div>


<!-- CHAT -->

<div class="card hidden" id="chatBox">

<div class="messages" id="messages"></div>

<div class="input-area">

<textarea id="input" rows="2" placeholder="Digite sua pergunta..."></textarea>

<button class="send" onclick="send()">Enviar</button>

</div>

</div>

</div>


<script>

/* ---------- CONFIGURAÇÃO ---------- */

const API_URL = "https://script.google.com/macros/s/AKfycbwoQb2CdsLYUNIJhhXCDKPkv0T_pg_JIzRS4DGKa0t9OdIkGRFcCNyPJc8WQ88I_ME3/exec";

/* ---------- LOGIN ---------- */

async function login(){

const user = document.getElementById("user").value
const password = document.getElementById("password").value

const res = await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"login",
user:user,
password:password
})
})

const data = await res.json()

if(data.ok){

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("chatBox").classList.remove("hidden")

}else{

document.getElementById("loginError").innerText="Usuário ou senha inválidos"

}

}

/* ---------- CHAT ---------- */

function addMessage(text, className){

const container = document.getElementById("messages")

const div = document.createElement("div")
div.className = "message " + className
div.innerText = text

container.appendChild(div)

container.scrollTop = container.scrollHeight

}

async function send(){

const input = document.getElementById("input")
const text = input.value.trim()

if(!text) return

addMessage("Você: " + text,"user")

input.value=""

const response = await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"chat",
message:text
})
})

const data = await response.json()

addMessage("IA: " + data.reply,"bot")

}

/* ---------- ENTER PARA ENVIAR ---------- */

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()
send()

}

})

</script>

</body>
</html>
